<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MorMaps Strategy Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <header class="panel-header">
          <p class="eyebrow">FRC Strategy Board</p>
          <h1>MorMaps Plays</h1>
          <p class="subtle">
            Draw routes, drop team markers, save each board state as a play step, then replay the
            whole strategy.
          </p>
        </header>

        <section class="panel-section">
          <div class="section-heading">
            <h2>Team Marker</h2>
            <div class="stacked-actions">
              <button id="remove-marker" class="ghost-button" type="button">Remove Selected</button>
              <button id="reset-board" class="ghost-button" type="button">Reset Board</button>
            </div>
          </div>

          <label>
            Team Number
            <input id="team-number" type="text" inputmode="numeric" placeholder="254" maxlength="6" />
          </label>

          <label>
            Role / Note
            <input id="team-label" type="text" placeholder="Intake bot" maxlength="24" />
          </label>

          <label>
            Marker Color
            <input id="team-color" type="color" value="#ff6b35" />
          </label>

          <label>
            Optional Logo
            <input id="team-logo" type="file" accept="image/*" />
          </label>

          <button id="add-marker" class="primary-button" type="button">Add Marker</button>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>Drawing</h2>
            <button id="clear-drawing" class="ghost-button" type="button">Clear Drawing</button>
          </div>

          <div class="tool-row">
            <button id="tool-pen" class="tool-button is-active" type="button">Pen</button>
            <button id="tool-eraser" class="tool-button" type="button">Eraser</button>
          </div>

          <label>
            Ink Color
            <input id="stroke-color" type="color" value="#1f2937" />
          </label>

          <label>
            Stroke Width
            <input id="stroke-width" type="range" min="2" max="16" value="5" />
          </label>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>Play Timeline</h2>
            <div class="playback-actions">
              <button id="play-sequence" class="primary-button" type="button">Play</button>
              <button id="pause-sequence" class="ghost-button" type="button">Pause</button>
            </div>
          </div>

          <label>
            Step Name
            <input id="step-name" type="text" placeholder="Auton path" maxlength="32" />
          </label>

          <label>
            Step Duration (seconds)
            <input id="step-duration" type="range" min="1" max="12" value="4" />
            <span id="step-duration-label" class="value-pill">4s</span>
          </label>

          <button id="add-step" class="primary-button" type="button">Add Play Step</button>

          <ol id="timeline-list" class="timeline-list"></ol>
        </section>
      </aside>

      <main class="board-panel">
        <section class="board-meta">
          <div>
            <p class="eyebrow">Live Board</p>
            <h2>Blank Field Canvas</h2>
          </div>
          <div id="status-pill" class="status-pill">Editing</div>
        </section>

        <div class="board-frame">
          <div id="field" class="field" aria-label="FRC strategy field">
            <svg class="field-svg" viewBox="0 0 1000 540" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <linearGradient id="fieldSurface" x1="0%" x2="100%" y1="0%" y2="0%">
                  <stop offset="0%" stop-color="#e8f7f2" />
                  <stop offset="100%" stop-color="#d8eef2" />
                </linearGradient>
                <pattern id="gridPattern" width="50" height="45" patternUnits="userSpaceOnUse">
                  <path d="M 50 0 L 0 0 0 45" fill="none" stroke="rgba(24, 39, 75, 0.08)" stroke-width="1" />
                </pattern>
              </defs>

              <rect x="0" y="0" width="1000" height="540" rx="28" fill="url(#fieldSurface)" />
              <rect x="20" y="20" width="960" height="500" rx="24" fill="url(#gridPattern)" stroke="#1b4332" stroke-width="4" />
              <line x1="500" y1="20" x2="500" y2="520" stroke="#1b4332" stroke-width="4" stroke-dasharray="18 18" />

              <rect x="40" y="85" width="170" height="370" rx="18" fill="rgba(15, 118, 110, 0.08)" stroke="#0f766e" stroke-width="3" />
              <rect x="790" y="85" width="170" height="370" rx="18" fill="rgba(190, 24, 93, 0.08)" stroke="#be185d" stroke-width="3" />

              <rect x="100" y="180" width="80" height="180" rx="10" fill="rgba(15, 118, 110, 0.08)" stroke="#0f766e" stroke-width="2" />
              <rect x="820" y="180" width="80" height="180" rx="10" fill="rgba(190, 24, 93, 0.08)" stroke="#be185d" stroke-width="2" />

              <circle cx="500" cy="270" r="52" fill="rgba(255, 255, 255, 0.65)" stroke="#1b4332" stroke-width="3" />
              <circle cx="500" cy="270" r="9" fill="#1b4332" />

              <rect x="435" y="145" width="130" height="250" rx="18" fill="rgba(250, 204, 21, 0.14)" stroke="#ca8a04" stroke-width="3" stroke-dasharray="10 8" />

              <text x="125" y="72" class="field-label alliance-label teal">ALLIANCE</text>
              <text x="815" y="72" class="field-label alliance-label rose">ALLIANCE</text>
              <text x="462" y="130" class="field-label center-label">CENTER ZONE</text>
            </svg>

            <canvas id="drawing-layer" class="drawing-layer"></canvas>
            <div id="marker-layer" class="marker-layer"></div>
          </div>
        </div>
      </main>
    </div>

    <template id="timeline-item-template">
      <li class="timeline-item">
        <div class="timeline-copy">
          <strong class="timeline-title"></strong>
          <span class="timeline-meta"></span>
        </div>
        <div class="timeline-actions">
          <button class="ghost-button timeline-load" type="button">Load</button>
          <button class="ghost-button timeline-delete" type="button">Delete</button>
        </div>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
